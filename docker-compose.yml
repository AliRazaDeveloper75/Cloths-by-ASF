version: '3.9'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-cloth_by_afs}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # NOT exposed to host — backend reaches it via Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-cloth_by_afs}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    volumes:
      # Bind-mount to host dirs served by Nginx
      - /var/www/cloths-by-asf/staticfiles:/app/staticfiles
      - /var/www/cloths-by-asf/media:/app/media
    ports:
      - "127.0.0.1:8000:8000"   # Only localhost — Nginx proxies inbound traffic
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
