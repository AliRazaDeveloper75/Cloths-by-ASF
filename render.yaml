databases:
  - name: cloth-by-afs-db
    databaseName: cloth_by_afs
    user: cloth_afs_user
    plan: free

services:
  # ── Django Backend ────────────────────────────────────────────
  - type: web
    name: cloth-by-afs-backend
    runtime: python
    pythonVersion: "3.12.0"
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    plan: free
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: cloth-by-afs-backend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: cloth-by-afs-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://cloth-by-afs.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://cloth-by-afs-backend.onrender.com
      - key: USE_S3
        value: "False"
      - key: DJANGO_LOG_LEVEL
        value: WARNING
      - key: FRONTEND_URL
        value: https://cloth-by-afs.onrender.com
      # Email — fill in your SMTP credentials in the Render dashboard (sync: false = secret)
      # - key: EMAIL_HOST_USER
      #   sync: false
      # - key: EMAIL_HOST_PASSWORD
      #   sync: false
      # Optional — uncomment and fill in if you set USE_S3=True
      # - key: AWS_ACCESS_KEY_ID
      #   sync: false
      # - key: AWS_SECRET_ACCESS_KEY
      #   sync: false
      # - key: AWS_STORAGE_BUCKET_NAME
      #   sync: false
      # - key: AWS_S3_REGION_NAME
      #   value: us-east-1

  # ── React Frontend (Static Site) ──────────────────────────────
  - type: web
    name: cloth-by-afs
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://cloth-by-afs-backend.onrender.com/api/v1
