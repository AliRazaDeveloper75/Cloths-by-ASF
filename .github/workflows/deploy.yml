name: Deploy to AWS EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH → EC2 deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          timeout:  300s
          script: bash /home/ubuntu/Cloths-by-ASF/scripts/deploy.sh
