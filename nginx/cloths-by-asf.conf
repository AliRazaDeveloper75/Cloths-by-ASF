# /etc/nginx/sites-available/cloths-by-asf
# Install: sudo cp nginx/cloths-by-asf.conf /etc/nginx/sites-available/cloths-by-asf
#          sudo ln -s /etc/nginx/sites-available/cloths-by-asf /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# For SSL (after pointing a domain to this IP):
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com

server {
    listen 80;
    server_name 51.20.91.11 yourdomain.com www.yourdomain.com;

    client_max_body_size 50M;

    # ── Frontend SPA (React build output) ───────────────────────────
    root  /var/www/cloths-by-asf/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Django static files (collected by entrypoint.sh) ────────────
    location /static/ {
        alias   /var/www/cloths-by-asf/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # ── Media uploads ────────────────────────────────────────────────
    location /media/ {
        alias   /var/www/cloths-by-asf/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Django REST API ──────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
    }

    # ── Django admin panel ───────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── API docs ─────────────────────────────────────────────────────
    location ~ ^/(swagger|redoc)/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Compression ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml image/svg+xml;
}
